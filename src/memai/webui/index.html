<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MemAI · Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='7' y='7' width='18' height='18' rx='2' transform='rotate(45 16 16)' fill='none' stroke='%23BB86FC' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='%23BB86FC'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/admin.css">
</head>
<body>

<aside class="rail">
  <div class="brand">
    <svg class="brand-seal" viewBox="0 0 34 34" aria-hidden="true">
      <rect x="8" y="8" width="18" height="18" rx="2.5" transform="rotate(45 17 17)"
            fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="12.5" y="12.5" width="9" height="9" rx="1.5" transform="rotate(45 17 17)"
            fill="none" stroke="currentColor" stroke-width="1" opacity=".55"/>
      <circle cx="17" cy="17" r="2" fill="currentColor"/>
    </svg>
    <div class="brand-text">
      <span class="brand-name">MemAI</span>
      <span class="brand-sub" data-i18n="brand.sub">memory administration</span>
    </div>
  </div>

  <nav class="nav" aria-label="Sections" data-i18n-aria="nav.aria">
    <a href="#/overview" data-view="overview">
      <svg viewBox="0 0 16 16"><rect x="1.5" y="1.5" width="5.4" height="5.4" rx="1"/><rect x="9.1" y="1.5" width="5.4" height="5.4" rx="1"/><rect x="1.5" y="9.1" width="5.4" height="5.4" rx="1"/><rect x="9.1" y="9.1" width="5.4" height="5.4" rx="1"/></svg>
      <span data-i18n="nav.overview">Overview</span></a>
    <a href="#/memories" data-view="memories">
      <svg viewBox="0 0 16 16"><path d="M2 3.5h12M2 8h12M2 12.5h8"/><circle cx="13.4" cy="12.5" r="1.1" fill="currentColor" stroke="none"/></svg>
      <span data-i18n="nav.memories">Memories</span></a>
    <a href="#/graph" data-view="graph">
      <svg viewBox="0 0 16 16"><circle cx="3.4" cy="12.4" r="1.9"/><circle cx="12.5" cy="11" r="1.9"/><circle cx="7.6" cy="3.4" r="1.9"/><path d="M6.7 5.1 4.2 10.6M9 4.7l2.6 4.6M5.3 12.2l5.3-.9"/></svg>
      <span data-i18n="nav.graph">Graph</span></a>
    <a href="#/domains" data-view="domains">
      <svg viewBox="0 0 16 16"><path d="M1.5 4.2c0-.7.5-1.2 1.2-1.2h3l1.5 1.7h6.1c.7 0 1.2.5 1.2 1.2v6.4c0 .7-.5 1.2-1.2 1.2H2.7c-.7 0-1.2-.5-1.2-1.2V4.2z"/></svg>
      <span data-i18n="nav.domains">Domains</span></a>
    <a href="#/maintenance" data-view="maintenance">
      <svg viewBox="0 0 16 16"><path d="M2 4.5h8.2M13.8 4.5H14M2 11.5h1.8M7.4 11.5H14"/><circle cx="11.9" cy="4.5" r="1.7"/><circle cx="5.6" cy="11.5" r="1.7"/></svg>
      <span data-i18n="nav.maintenance">Maintenance</span></a>
    <a href="#/optimization" data-view="optimization">
      <svg viewBox="0 0 16 16"><path d="M8 1.5v2.2M8 12.3v2.2M1.5 8h2.2M12.3 8h2.2M3.4 3.4l1.6 1.6M11 11l1.6 1.6M12.6 3.4 11 5M5 11l-1.6 1.6"/><circle cx="8" cy="8" r="2.4"/></svg>
      <span data-i18n="nav.optimization">Optimization</span></a>
  </nav>

  <div class="rail-foot">
    <div id="railHealth" class="rail-health"></div>
  </div>
</aside>

<div class="frame">
  <header class="topbar">
    <div class="searchbox">
      <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="7" cy="7" r="4.6"/><path d="m10.6 10.6 3 3"/></svg>
      <input id="globalSearch" type="search" spellcheck="false" autocomplete="off"
             placeholder="Search memories — keywords + vectors"
             aria-label="Global search"
             data-i18n-placeholder="search.placeholder" data-i18n-aria="search.aria">
      <kbd>/</kbd>
    </div>
    <div class="topbar-right">
      <span id="dbBadge" class="db-badge" title=""></span>
      <select id="langSel" class="lang-sel" aria-label="Language"></select>
      <button id="btnNew" class="btn btn-solid" data-i18n="topbar.newMemory">+ New memory</button>
    </div>
  </header>

  <main id="view" class="view" tabindex="-1"></main>
</div>

<div id="scrim" class="scrim" hidden></div>
<aside id="drawer" class="drawer" hidden aria-label="Memory record" data-i18n-aria="drawer.aria"></aside>
<div id="modalRoot"></div>
<div id="toasts" class="toasts" aria-live="polite"></div>
<div id="tip" class="tip" hidden></div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
